# ---------------------------------------------------------------------------
# Pattern 3: scheduled check that PUSHES metrics to a Prometheus Pushgateway
# instead of signalling via exit code. Alert in Prometheus on the pushed gauges
# (e.g. tlschecker_days_before_expired < 15). Each host is pushed under
# instance="<host>" and joined to labels via tlschecker_certificate_info.
# Drop --exit-code so a soon-to-expire cert doesn't fail the Job — the metric
# carries the signal. Replace the gateway address with your own.
# ---------------------------------------------------------------------------
#           args:
#             - "example.com"
#             - "expired.badssl.com"
#             - "--grade"
#             - "--check-revocation"
#             - "--prometheus"
#             - "--prometheus-address"
#             - "http://prometheus-pushgateway.monitoring.svc:9091"
